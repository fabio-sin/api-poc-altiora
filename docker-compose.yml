version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:8.6.1-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: indexer
    volumes:
      - ./data/cvs:/data/cvs
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=cvs
      - CVS_DIR=/data/cvs
    depends_on:
      - qdrant
    profiles:
      - manual
    restart: "no"

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/project/app # ← monte le code en live
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
      - COLLECTION_NAME=cvs
      - LITELLM_URL=http://litellm:4000
      - CACHE_TTL=3600
    depends_on:
      - qdrant
      - redis
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data: